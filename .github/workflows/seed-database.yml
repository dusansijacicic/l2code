# Ručno pokretanje seed skripte protiv Supabase baze (npr. produkcija).
#
# Repo → Settings → Secrets and variables → Actions → New repository secret:
#   NEXT_PUBLIC_SUPABASE_URL   — https://xxxx.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY  — service_role JWT (nikad u klijent / commit)
#
# Pokretanje: Actions → "Seed database" → Run workflow → branch (main) → Run workflow.

name: Seed database

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: .

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run seed
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm --filter web seed
